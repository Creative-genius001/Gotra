apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotra-api
  namespace: gotra
spec:
  replicas: 2
  selector:
    matchLabels: { app: gotra-api }
  template:
    metadata:
      labels: { app: gotra-api }
    spec:
      containers:
        - name: api
          image: ghcr.io/gotra/gotra-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: gotra-config }
            - secretRef: { name: gotra-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: gotra-api
  namespace: gotra
spec:
  selector: { app: gotra-api }
  ports:
    - port: 80
      targetPort: 8080
