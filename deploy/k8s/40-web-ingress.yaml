apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotra-web
  namespace: gotra
spec:
  replicas: 2
  selector:
    matchLabels: { app: gotra-web }
  template:
    metadata:
      labels: { app: gotra-web }
    spec:
      containers:
        - name: web
          image: ghcr.io/gotra/gotra-web:latest
          ports:
            - containerPort: 3000
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: gotra-web
  namespace: gotra
spec:
  selector: { app: gotra-web }
  ports:
    - port: 80
      targetPort: 3000
---
# App + API ingress (TLS via cert-manager). The tunnel gateway is NOT here — it
# owns its own LoadBalancer + wildcard DNS (see 30-gateway.yaml).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gotra
  namespace: gotra
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts: [app.gotra.dev, api.gotra.dev]
      secretName: gotra-tls
  rules:
    - host: app.gotra.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: gotra-web, port: { number: 80 } }
    - host: api.gotra.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: gotra-api, port: { number: 80 } }
