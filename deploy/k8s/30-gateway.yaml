apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotra-gateway
  namespace: gotra
spec:
  replicas: 3 # stateless across instances; coordinates tunnel routing via Redis
  selector:
    matchLabels: { app: gotra-gateway }
  template:
    metadata:
      labels: { app: gotra-gateway }
    spec:
      containers:
        - name: gateway
          image: ghcr.io/gotra/gotra-gateway:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef: { name: gotra-config }
            - secretRef: { name: gotra-secrets }
          readinessProbe:
            httpGet: { path: /health, port: 8081 }
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: autocert
              mountPath: /var/lib/gotra/autocert
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
      volumes:
        - name: autocert
          emptyDir: {} # use a shared PVC if all gateways must share ACME cert cache
---
# Public-facing: wildcard DNS *.tunnels.gotra.dev must resolve to this LB.
# The gateway terminates TLS (autocert issues a cert per tunnel hostname).
apiVersion: v1
kind: Service
metadata:
  name: gotra-gateway
  namespace: gotra
spec:
  type: LoadBalancer
  selector: { app: gotra-gateway }
  ports:
    - name: https
      port: 443
      targetPort: 8081
    - name: http
      port: 80
      targetPort: 8081
