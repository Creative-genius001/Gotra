# Production-style compose: builds images from the Dockerfiles and runs the full
# stack. Copy .env.example to .env and fill secrets first.
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Scale the stateless gateway: docker compose -f docker-compose.prod.yml up -d --scale gateway=3
# (gateways coordinate via Redis; front them with a load balancer in real deploys).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gotra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gotra}
      POSTGRES_DB: ${POSTGRES_DB:-gotra}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gotra}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    profiles: ["analytics"]
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: gotra
      CLICKHOUSE_USER: gotra
      CLICKHOUSE_PASSWORD: gotra
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }

  # One-shot migration runner; the api/gateway start after it completes.
  migrate:
    build: { context: ./services, args: { SERVICE: api } }
    command: ["migrate", "up"]
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gotra}:${POSTGRES_PASSWORD:-gotra}@postgres:5432/${POSTGRES_DB:-gotra}?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  api:
    build: { context: ./services, args: { SERVICE: api } }
    restart: unless-stopped
    env_file: .env
    environment:
      API_HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-gotra}:${POSTGRES_PASSWORD:-gotra}@postgres:5432/${POSTGRES_DB:-gotra}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  gateway:
    build: { context: ./services, args: { SERVICE: gateway } }
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-gotra}:${POSTGRES_PASSWORD:-gotra}@postgres:5432/${POSTGRES_DB:-gotra}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8081:8081"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pg-data:
  redis-data:
  clickhouse-data:
